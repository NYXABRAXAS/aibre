version: "3.9"

# ============================================================
# OPTIM AI BRE Engine - Docker Compose (Production)
# ============================================================

x-common-env: &common-env
  ASPNETCORE_ENVIRONMENT: Production
  ConnectionStrings__PostgreSQL: "Host=postgres;Database=optimai_bre;Username=optimai;Password=${POSTGRES_PASSWORD}"
  ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
  Jwt__SecretKey: "${JWT_SECRET_KEY}"
  Jwt__Issuer: "OptimAI.BRE"
  Jwt__Audience: "OptimAI.BRE.Clients"
  AiOptions__Endpoint: "${AZURE_OPENAI_ENDPOINT}"
  AiOptions__ApiKey: "${AZURE_OPENAI_KEY}"
  AiOptions__ModelName: "${OPENAI_MODEL:-gpt-4o}"
  AiOptions__UseAzureOpenAI: "${USE_AZURE_OPENAI:-true}"
  Serilog__WriteTo__0__Name: "Console"

services:
  # ============================================================
  # API GATEWAY / BRE ENGINE
  # ============================================================
  bre-gateway:
    image: optimai/bre-gateway:${VERSION:-latest}
    build:
      context: ../src/backend
      dockerfile: ../docker/Dockerfile.backend
      args:
        PROJECT: OptimAI.BRE.Gateway
    environment:
      <<: *common-env
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - bre-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bre-api.rule=Host(`api.optimaibre.com`)"
      - "traefik.http.routers.bre-api.tls=true"
      - "traefik.http.routers.bre-api.tls.certresolver=letsencrypt"

  # ============================================================
  # FRONTEND
  # ============================================================
  bre-frontend:
    image: optimai/bre-frontend:${VERSION:-latest}
    build:
      context: ../src/frontend/optim-ai-bre-ui
      dockerfile: ../../../docker/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: "https://api.optimaibre.com/api/v1"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - bre-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bre-ui.rule=Host(`app.optimaibre.com`)"

  # ============================================================
  # POSTGRESQL
  # ============================================================
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: optimai_bre
      POSTGRES_USER: optimai
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optimai -d optimai_bre"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bre-network
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "log_min_duration_statement=1000"

  # ============================================================
  # REDIS
  # ============================================================
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - bre-network

  # ============================================================
  # ELASTICSEARCH (Rule Hit Analytics)
  # ============================================================
  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=bre-cluster
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bre-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================================
  # TRAEFIK (Reverse Proxy / Load Balancer)
  # ============================================================
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    restart: unless-stopped
    networks:
      - bre-network

  # ============================================================
  # PGADMIN (Development only)
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@optimai.in
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:-admin123}"
    ports:
      - "5050:80"
    networks:
      - bre-network

volumes:
  postgres-data:
  redis-data:
  es-data:
  traefik-certs:

networks:
  bre-network:
    driver: bridge
